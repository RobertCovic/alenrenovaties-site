<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | AlenRenovaties</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="script.js"></script>
</head>
<body>
  <header>
    <h1>AlenRenovaties</h1>
    <nav>
      <a href="index-en.html">Home</a>
      <a href="contact.html">Contact</a>
    </nav>
    <select id="language-selector" onchange="changeLanguage(this.value)">
  <option value="index-en">English</option>
  <option value="index-fr">Français</option>
  <option value="index-nl">Nederlands</option>
</select>
  </header>
  <main>
    <h2>Contact Us</h2>
    <form action="#" method="post">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required />

      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </main>
  <footer>
    <p>&copy; 2025 AlenRenovaties. All rights reserved.</p>
  </footer>
</body>
</html>
